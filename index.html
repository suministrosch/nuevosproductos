<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REQUERIMIENTO DE NUEVO PRODUCTO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f0fa;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background-color: #e6f0fa;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid #b3d4fc;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        h2 {
            color: #0056b3;
            text-transform: uppercase;
            border-bottom: 2px solid #b3d4fc;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-group {
            display: flex;
            margin-bottom: 12px;
            align-items: center;
        }
        .form-group label {
            width: 220px;
            text-align: right;
            margin-right: 15px;
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }
        .form-group input, .form-group select, .form-group textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }
        .row-group {
            display: flex;
            flex: 1;
            gap: 10px;
            align-items: center;
        }
        .short-input { width: 80px !important; flex: none !important; }
        .readonly-input { background-color: #f0f0f0; cursor: not-allowed; }
        
        /* Contenedor para alinear los botones a la derecha */
        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-submit, .btn-clear {
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border-radius: 4px;
        }

        .btn-submit {
            background-color: #ffffff;
            border: 2px solid #0056b3;
            color: #0056b3;
        }
        .btn-submit:hover {
            background-color: #0056b3;
            color: white;
        }
        .btn-submit:disabled {
            background-color: #cccccc;
            border-color: #999999;
            color: #666666;
            cursor: not-allowed;
        }

        .btn-clear {
            background-color: #ffffff;
            border: 2px solid #dc3545;
            color: #dc3545;
        }
        .btn-clear:hover {
            background-color: #dc3545;
            color: white;
        }

        .debug-box {
            background: #fff3cd;
            padding: 15px;
            border: 1px solid #ffeeba;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 13px;
        }

        /* Pantalla de carga (Overlay) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Fondo grisáceo semitransparente */
            z-index: 9999;
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 20px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #0056b3;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- Elemento para oscurecer la pantalla durante la carga -->
<div id="loadingOverlay" class="overlay">
    <div class="spinner"></div>
    <div id="loadingText">Enviando correo, por favor espere...</div>
</div>

<div class="form-container">
    <div id="local-notice" class="debug-box" style="display:none;">
        <strong>Modo de prueba local:</strong> El navegador bloqueó la lectura automática del CSV por seguridad. 
        <br>Selecciona el archivo <b>auxiliar.csv</b> de tu carpeta para cargar las listas:
        <input type="file" id="localCsvInput" accept=".csv" style="margin-top:10px;">
    </div>

    <h2>REQUERIMIENTO DE NUEVO PRODUCTO</h2>
    
    <form id="productForm">
        <div class="form-group">
            <label>Usuario / Correo *</label>
            <select id="correo" name="correo" required></select>
        </div>
        <div class="form-group">
            <label>Fecha actual *</label>
            <input type="text" id="fecha" name="fecha" readonly class="readonly-input">
        </div>

        <div class="form-group">
            <label>Descripción *</label>
            <input type="text" id="descripcion" name="descripcion" required placeholder="Ej: Lapicera 0.5 mm azul">
        </div>

        <div class="form-group">
            <label>Familia</label>
            <select id="familia" name="familia"></select>
        </div>

        <div class="form-group">
            <label>Super Categoría / Categoría *</label>
            <select id="superCategoria" name="superCategoria" required></select>
        </div>

        <div class="form-group">
            <label>Unidad *</label>
            <select id="unidad" name="unidad" required></select>
        </div>

        <div class="form-group">
            <label>Material *</label>
            <input type="text" id="material" name="material" required>
        </div>

        <div class="form-group">
            <label>Norma / Nro. Res.</label>
            <div class="row-group">
                <select id="norma" name="norma"></select>
                <input type="text" id="nroRes" name="nroRes" placeholder="Nro / Res">
            </div>
        </div>

        <div class="form-group">
            <label>Marca / Fabricante *</label>
            <input type="text" id="marca" name="marca" required>
        </div>
        <div class="form-group">
            <label>Código Fabricante</label>
            <input type="text" id="codigoFabricante" name="codigoFabricante">
        </div>

        <div class="form-group">
            <label>Dimensiones (L x An x Al)</label>
            <div class="row-group">
                <input type="number" id="dimLargo" class="short-input" placeholder="Largo">
                <input type="number" id="dimAncho" class="short-input" placeholder="Ancho">
                <input type="number" id="dimAlto" class="short-input" placeholder="Alto">
                <select id="unidadDimensiones" name="unidadDimensiones"></select>
            </div>
        </div>

        <div class="form-group">
            <label>Peso Neto / Peso Bruto</label>
            <div class="row-group">
                <input type="number" step="0.01" id="pesoNeto" class="short-input" placeholder="Neto">
                <select id="unidadPesoNeto" style="max-width: 80px;"></select>
                <span style="font-weight: bold;">/</span>
                <input type="number" step="0.01" id="pesoBruto" class="short-input" placeholder="Bruto">
                <select id="unidadPesoBruto" style="max-width: 80px;"></select>
            </div>
        </div>

        <div class="form-group">
            <label>Fragilidad</label>
            <div style="flex:1;">
                <select id="fragilidadSelect" onchange="toggleSelection(this, 'fragilidad')"></select>
                <input type="text" id="fragilidad" readonly class="readonly-input" style="margin-top:5px; width:100%;">
            </div>
        </div>

        <div class="form-group">
            <label>Peligrosidad</label>
            <div style="flex:1;">
                <select id="peligrosidadSelect" onchange="toggleSelection(this, 'peligrosidad')"></select>
                <input type="text" id="peligrosidad" readonly class="readonly-input" style="margin-top:5px; width:100%;">
            </div>
        </div>

        <div class="form-group">
            <label>Código de barras</label>
            <input type="text" id="codigoBarras" maxlength="165">
        </div>

        <div class="form-group">
            <label>Lleva Trazabilidad</label>
            <input type="checkbox" id="trazabilidad" style="width: 20px; flex:none;">
        </div>

        <div class="form-group">
            <label>Reposición en (meses)</label>
            <input type="number" id="reposicion" class="short-input">
        </div>

        <div class="form-group">
            <label>Notas adicionales</label>
            <textarea id="notas" maxlength="256" rows="3"></textarea>
        </div>

        <!-- Botones agrupados -->
        <div class="button-group">
            <button type="button" class="btn-clear" onclick="limpiarFormulario()">BORRAR DATOS</button>
            <button type="button" class="btn-submit" onclick="enviarFormulario()">CARGAR / ENVIAR</button>
        </div>
    </form>
</div>

<script>
    // Establecer fecha actual
    const hoy = new Date();
    document.getElementById('fecha').value = hoy.toLocaleDateString('es-AR');

    // Función para limpiar el formulario con confirmación
    function limpiarFormulario() {
        if (confirm("¿Estás seguro de que deseas borrar todos los datos del formulario?")) {
            document.getElementById('productForm').reset();
            // Restablecer la fecha actual tras el reset
            document.getElementById('fecha').value = new Date().toLocaleDateString('es-AR');
        }
    }

    // Lógica de selección múltiple
    function toggleSelection(selectElement, targetInputId) {
        const valNuevo = selectElement.value;
        if (!valNuevo) return;
        
        const inputTarget = document.getElementById(targetInputId);
        const separador = " ; ";
        let valores = inputTarget.value ? inputTarget.value.split(separador) : [];

        const index = valores.indexOf(valNuevo);
        if (index === -1) {
            valores.push(valNuevo); // No está, lo agrego
        } else {
            valores.splice(index, 1); // Ya está, lo quito
        }
        
        inputTarget.value = valores.join(separador);
        selectElement.selectedIndex = 0; 
    }

    // Carga de CSV y población de listas (Actualizado para leer acentos)
    async function init() {
        try {
            const response = await fetch('auxiliar.csv');
            if (!response.ok) throw new Error();
            
            // Leemos el archivo como ArrayBuffer para poder decodificarlo manualmente
            const buffer = await response.arrayBuffer();
            
            // Forzamos la decodificación en ISO-8859-1 (el formato estándar de Excel en español)
            const decoder = new TextDecoder('iso-8859-1');
            const text = decoder.decode(buffer);
            
            procesarCSV(text);
        } catch (e) {
            document.getElementById('local-notice').style.display = 'block';
        }
    }

    // Actualizado para leer acentos en caso de subida manual
    document.getElementById('localCsvInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            procesarCSV(event.target.result);
            document.getElementById('local-notice').style.display = 'none';
        };
        // Agregamos el parámetro 'ISO-8859-1' para que mantenga las eñes y tildes
        reader.readAsText(e.target.files[0], 'ISO-8859-1');
    });

    function procesarCSV(data) {
        const filas = data.split(/\r?\n/);
        const sets = {
            familia: new Set(), superCat: new Set(), unidad: new Set(),
            norma: new Set(), unidDim: new Set(), unidPeso: new Set(),
            fragilidad: new Set(), peligrosidad: new Set(), correos: new Set()
        };

        filas.forEach((fila, i) => {
            if (i === 0 || !fila.trim()) return;
            const c = fila.split(',');
            if (c[0]) sets.familia.add(c[0].trim());
            if (c[2]) sets.superCat.add(c[2].trim());
            if (c[5]) sets.unidad.add(c[5].trim());
            if (c[6]) sets.norma.add(c[6].trim());
            if (c[7]) sets.unidDim.add(c[7].trim());
            if (c[8]) sets.unidPeso.add(c[8].trim());
            if (c[9]) sets.fragilidad.add(c[9].trim());
            if (c[10]) sets.peligrosidad.add(c[10].trim());
            if (c[12]) sets.correos.add(c[12].trim());
        });

        const llenar = (id, set) => {
            const el = document.getElementById(id);
            el.innerHTML = '<option value="">-- Seleccionar --</option>';
            [...set].sort().forEach(v => el.add(new Option(v, v)));
        };

        llenar('correo', sets.correos);
        llenar('familia', sets.familia);
        llenar('superCategoria', sets.superCat);
        llenar('unidad', sets.unidad);
        llenar('norma', sets.norma);
        llenar('unidadDimensiones', sets.unidDim);
        llenar('unidadPesoNeto', sets.unidPeso);
        llenar('unidadPesoBruto', sets.unidPeso);
        llenar('fragilidadSelect', sets.fragilidad);
        llenar('peligrosidadSelect', sets.peligrosidad);
    }

    // FUNCIÓN PARA ENVIAR A GOOGLE APPS SCRIPT
    function enviarFormulario() {
        const form = document.getElementById('productForm');
        
        // Validar campos requeridos nativos de HTML
        if (!form.checkValidity()) {
            form.reportValidity(); 
            return;
        }

        // ==========================================
        // NUEVAS VALIDACIONES DE PESOS Y UNIDADES
        // ==========================================
        const pesoNetoInput = document.getElementById('pesoNeto').value.trim();
        const unidadNetoInput = document.getElementById('unidadPesoNeto').value;
        const n = parseFloat(pesoNetoInput) || 0;
        
        if (pesoNetoInput !== "" && !unidadNetoInput) {
            alert("Por favor, seleccione una unidad para el Peso Neto.");
            return;
        }

        const pesoBrutoInput = document.getElementById('pesoBruto').value.trim();
        const unidadBrutoInput = document.getElementById('unidadPesoBruto').value;
        const b = parseFloat(pesoBrutoInput) || 0;

        if (pesoBrutoInput !== "" && !unidadBrutoInput) {
            alert("Por favor, seleccione una unidad para el Peso Bruto.");
            return;
        }

        if (b > 0 && b < n) {
            alert("El Peso Bruto no puede ser menor al Peso Neto.");
            return;
        }
        
        // Capturar correo del usuario
        const correoCarga = document.getElementById('correo').value;
        if (!correoCarga) {
            alert("Debe seleccionar un Usuario / Correo.");
            return;
        }

        // Construcción del cuerpo (Body) del correo y listado de valores
        const campos = [
            ["Usuario", correoCarga],
            ["Fecha", document.getElementById('fecha').value],
            ["Descripción", document.getElementById('descripcion').value],
            ["Familia", document.getElementById('familia').value],
            ["Super Cat/Cat", document.getElementById('superCategoria').value],
            ["Unidad", document.getElementById('unidad').value],
            ["Material", document.getElementById('material').value],
            ["Norma", document.getElementById('norma').value + " " + document.getElementById('nroRes').value],
            ["Marca", document.getElementById('marca').value],
            ["Cod. Fab", document.getElementById('codigoFabricante').value],
            ["Dimensiones", `${document.getElementById('dimLargo').value}x${document.getElementById('dimAncho').value}x${document.getElementById('dimAlto').value} ${document.getElementById('unidadDimensiones').value}`],
            ["Peso Neto", n + " " + document.getElementById('unidadPesoNeto').value],
            ["Peso Bruto", b + " " + document.getElementById('unidadPesoBruto').value],
            ["Fragilidad", document.getElementById('fragilidad').value],
            ["Peligrosidad", document.getElementById('peligrosidad').value],
            ["Cod. Barras", document.getElementById('codigoBarras').value],
            ["Trazabilidad", document.getElementById('trazabilidad').checked ? "SÍ" : "NO"],
            ["Reposición", document.getElementById('reposicion').value + " meses"],
            ["Notas", document.getElementById('notas').value]
        ];

        let bodyText = "REQUERIMIENTO DE NUEVO PRODUCTO\n" + "=".repeat(30) + "\n\n";
        campos.forEach(cp => { 
            // Filtramos campos vacíos o con valores por defecto de la concatenación para el correo
            if(cp[1] && cp[1].trim() !== "0" && cp[1].trim() !== "0 meses" && cp[1].trim() !== "x x") {
                bodyText += `${cp[0]}: ${cp[1]}\n`; 
            }
        });

        // Extraemos un arreglo únicamente con los valores limpios, ideal para insertar en columnas de Google Sheets
        const valoresParaSheet = campos.map(campo => campo[1]);

        const subject = "ALTA PRODUCTO: " + document.getElementById('descripcion').value;

        // Mostrar la pantalla de carga (overlay)
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';

        // Preparamos los datos en formato JSON agregando sheetData
        const payload = {
            correoCarga: correoCarga,
            subject: subject,
            bodyText: bodyText,
            sheetData: valoresParaSheet // <-- Nueva propiedad con el array de datos
        };

        const scriptURL = 'https://script.google.com/macros/s/AKfycbxIlZ8FiPxMFLF2dSga18P3EvLwR4XhMAVsy_U6xHjr_gZXhMsNAxWn5rtyP99H4Ik5gQ/exec';

        // Enviamos la petición a Google
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Evita bloqueos de seguridad del navegador
            headers: {
                'Content-Type': 'text/plain' 
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("¡El requerimiento fue enviado y registrado exitosamente!");
            form.reset(); // Limpia todos los campos
            document.getElementById('fecha').value = new Date().toLocaleDateString('es-AR'); // Repone la fecha
        })
        .catch(error => {
            alert("Hubo un error de conexión al intentar procesar el formulario.");
            console.error('Error!', error);
        })
        .finally(() => {
            // Ocultar la pantalla de carga al terminar
            overlay.style.display = 'none';
        });
    }

    init();
</script>

</body>
</html>
